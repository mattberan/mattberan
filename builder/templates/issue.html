<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{subject}} — The Beran Brief</title>
<meta name="description" content="{{description}}">
<meta property="og:title" content="{{subject}}">
<meta property="og:description" content="{{description}}">
<meta property="og:url" content="{{issue_url}}">
<meta property="og:type" content="article">
<link rel="canonical" href="{{issue_url}}">
<link rel="stylesheet" href="/styles/main.css">
<script>
  (function(){
    var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
</head>
<body>
<header>
  <a href="/" class="home-link">Matt Beran</a>
  <nav><a href="/bb/">BB</a></nav>
</header>

<main class="issue">
  <time datetime="{{date}}">{{date}}</time>
  <h1 class="issue-title">{{subject}}</h1>
  <p class="greeting">{{greeting}}</p>

  <div class="items">
    {{items}}
  </div>
</main>

<footer>
  <div class="subscribe-cta">
    <p>Everything you need to know. Nothing you don't.</p>
    <a href="/bb/#subscribe" class="subscribe-btn">Subscribe to The Beran Brief</a>
  </div>
  <nav class="issue-nav">
    <a href="/bb/">← All issues</a>
  </nav>
</footer>
</body>
</html>
