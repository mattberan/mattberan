<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{sentence}} — Matt Beran</title>
<meta name="description" content="{{description}}">
<meta property="og:title" content="{{sentence}}">
<meta property="og:description" content="{{description}}">
<meta property="og:url" content="{{page_url}}">
<meta property="og:type" content="article">
<link rel="canonical" href="{{page_url}}">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>
<header>
  <a href="/" class="home-link">Matt Beran</a>
  <nav><a href="/newsletter/">The Beran Brief</a></nav>
</header>

<main class="deep-page">
  <nav class="breadcrumb">
    <a href="{{issue_url}}">&larr; Back to {{date}}</a>
  </nav>

  <span class="category">{{category}}</span>
  <h1>{{sentence}}</h1>

  <div class="content">
    {{content}}
  </div>
</main>

<footer>
  <div class="subscribe-cta">
    <p>Everything you need to know. Nothing you don't.</p>
    <a href="/newsletter/#subscribe" class="subscribe-btn">Subscribe to The Beran Brief</a>
  </div>
</footer>
</body>
</html>
