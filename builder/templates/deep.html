<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{sentence}} — Matt Beran</title>
<meta name="description" content="{{description}}">
<meta property="og:title" content="{{sentence}}">
<meta property="og:description" content="{{description}}">
<meta property="og:url" content="{{page_url}}">
<meta property="og:type" content="article">
<link rel="canonical" href="{{page_url}}">
<link rel="stylesheet" href="/styles/main.css">
<script>
  (function(){
    var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
</head>
<body>
<header>
  <a href="/" class="home-link">Matt Beran</a>
</header>

<main class="deep-page">
  <nav class="breadcrumb">
    <a href="{{issue_url}}">&larr; Back to {{date}}</a>
  </nav>

  <span class="category">{{category}}</span>
  <h1>{{sentence}}</h1>

  <div class="content">
    {{content}}
  </div>
</main>

<footer>
  <div class="subscribe-cta">
    <p>Everything you need to know. Nothing you don't.</p>
    <a href="/bb/#subscribe" class="subscribe-btn">Subscribe to The Beran Brief</a>
  </div>
</footer>

<section class="comments">
  <script src="https://giscus.app/client.js"
    data-repo="mattberan/mattberan"
    data-repo-id="R_kgDORP3Q4Q"
    data-category="General"
    data-category-id="DIC_kwDORP3Q4c4C_47V"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="dark"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
</section>
</body>
</html>
