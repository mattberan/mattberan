<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm your subscription — The Beran Brief</title>
<link rel="stylesheet" href="/styles/main.css">
<script>
  (function(){
    var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
</head>
<body>
<header>
  <a href="/" class="home-link">Matt Beran</a>
</header>

<main style="max-width:480px;margin:80px auto;padding:0 24px;text-align:center;">
  <div id="confirm-box">
    <h1 style="font-size:1.4rem;margin-bottom:16px;">Confirm your subscription</h1>
    <p id="confirm-msg" style="margin-bottom:24px;line-height:1.6;">Loading...</p>
    <button id="confirm-btn" style="display:none;padding:10px 24px;background:var(--text);color:var(--bg);border:none;border-radius:4px;font-size:15px;cursor:pointer;" onclick="confirmSubscription()">Yes, subscribe me</button>
  </div>
  <div id="success-box" style="display:none;">
    <h1 style="font-size:1.4rem;margin-bottom:16px;">You're in!</h1>
    <p style="line-height:1.6;">Welcome to The Beran Brief. You'll get the next issue in your inbox.</p>
    <a href="/bb/" style="display:inline-block;margin-top:24px;">Browse past issues &rarr;</a>
  </div>
  <div id="error-box" style="display:none;">
    <h1 style="font-size:1.4rem;margin-bottom:16px;">Something went wrong</h1>
    <p style="line-height:1.6;">This confirmation link doesn't look right. If you signed up recently, try clicking the link in your email again.</p>
  </div>
</main>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var t = params.get('t');
  var msgEl = document.getElementById('confirm-msg');
  var btnEl = document.getElementById('confirm-btn');

  if (!t) { showError(); return; }

  try {
    var email = atob(decodeURIComponent(t));
    if (!email || !email.includes('@')) throw new Error('invalid');
    msgEl.textContent = 'Click below to confirm your subscription for ' + email + '.';
    btnEl.style.display = '';
    btnEl.dataset.email = email;
  } catch(e) {
    showError();
  }
})();

function showError() {
  document.getElementById('confirm-box').style.display = 'none';
  document.getElementById('error-box').style.display = '';
}

async function confirmSubscription() {
  var btn = document.getElementById('confirm-btn');
  var email = btn.dataset.email;
  btn.disabled = true;
  btn.textContent = 'Confirming...';

  try {
    var res = await fetch('https://formspree.io/f/mykqdvza', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    if (res.ok) {
      document.getElementById('confirm-box').style.display = 'none';
      document.getElementById('success-box').style.display = '';
    } else {
      btn.disabled = false;
      btn.textContent = 'Try again';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Try again';
  }
}
</script>
</body>
</html>
